slam_toolbox:
  ros__parameters:
    use_sim_time: true
    base_frame: r100/base_link
    odom_frame: r100/odom
    map_frame: map
    scan_topic: /sensors/front_lidar/scan
    mode: mapping
    resolution: 0.05
    max_laser_range: 20.0
    minimum_time_interval: 0.5
    transform_publish_period: 0.02
    map_update_interval: 2.0
    transform_timeout: 0.5        
    tf_buffer_duration: 30.0  