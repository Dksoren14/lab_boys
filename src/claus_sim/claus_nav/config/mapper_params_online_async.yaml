slam_toolbox:
  ros__parameters:
    use_sim_time: true

    base_frame: chassis_link
    odom_frame: odom
    map_frame: map
    scan_topic: /scan

    mode: mapping
    resolution: 0.05
    max_laser_range: 20.0
    minimum_time_interval: 0.5
    transform_publish_period: 0.02
    map_update_interval: 2.0